<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Enterprise Homelab Network Topology</title>
  <desc id="desc">Topology diagram showing home router, Cisco Catalyst 3750G switch, Windows Server domain controller and NFS storage, Proxmox cluster nodes, Ubuntu VM, Docker, and Portainer.</desc>
  <defs>
    <style>
      .bg { fill: #f6f8fa; }
      .card { fill: #ffffff; stroke: #c9d1d9; stroke-width: 2; }
      .zone { fill: #eef6ff; stroke: #8c959f; stroke-width: 2; stroke-dasharray: 10 8; }
      .title { font: 700 34px Arial, sans-serif; fill: #1f2328; }
      .subtitle { font: 18px Arial, sans-serif; fill: #57606a; }
      .h { font: 700 22px Arial, sans-serif; fill: #24292f; }
      .t { font: 16px Arial, sans-serif; fill: #24292f; }
      .s { font: 14px Arial, sans-serif; fill: #57606a; }
      .line { stroke: #57606a; stroke-width: 4; fill: none; stroke-linecap: round; }
      .trunk { stroke: #0969da; stroke-width: 5; fill: none; stroke-linecap: round; }
      .nfs { stroke: #2da44e; stroke-width: 5; fill: none; stroke-linecap: round; stroke-dasharray: 14 10; }
      .vm { stroke: #bf8700; stroke-width: 4; fill: none; stroke-linecap: round; }
      .label { font: 700 15px Arial, sans-serif; fill: #24292f; }
      .pill { fill: #ddf4ff; stroke: #54aeef; stroke-width: 1.5; }
      .pill2 { fill: #dafbe1; stroke: #2da44e; stroke-width: 1.5; }
      .pill3 { fill: #fff8c5; stroke: #bf8700; stroke-width: 1.5; }
    </style>
  </defs>

  <rect class="bg" width="1400" height="900"/>
  <text class="title" x="60" y="62">Enterprise Infrastructure Homelab Topology</text>
  <text class="subtitle" x="60" y="94">Cisco switching, Windows Server infrastructure, Proxmox cluster, Windows NFS shared storage, Ubuntu, Docker, and Portainer.</text>

  <rect class="card" x="60" y="145" width="220" height="120" rx="12"/>
  <text class="h" x="95" y="188">Home Router</text>
  <text class="t" x="95" y="218">Internet uplink</text>
  <text class="s" x="95" y="242">Upstream/home LAN</text>

  <rect class="card" x="500" y="145" width="360" height="155" rx="12"/>
  <text class="h" x="545" y="185">Cisco Catalyst 3750G</text>
  <text class="t" x="545" y="215">Core lab switch</text>
  <text class="s" x="545" y="240">VLAN 10: 10.10.10.0/24</text>
  <text class="s" x="545" y="263">VLAN 20: 10.20.20.0/24</text>
  <text class="s" x="545" y="286">SSH management enabled</text>

  <path class="trunk" d="M280 205 C350 205, 420 205, 500 205"/>
  <text class="label" x="330" y="188">router uplink</text>

  <rect class="zone" x="60" y="360" width="1280" height="460" rx="18"/>
  <text class="h" x="90" y="400">Lab Network: VLAN 10 / 10.10.10.0/24</text>

  <rect class="card" x="105" y="445" width="310" height="230" rx="12"/>
  <text class="h" x="135" y="485">Windows Server 2016</text>
  <text class="t" x="135" y="515">LAB-DC-01</text>
  <text class="s" x="135" y="540">Domain: lab.corbitpros.com</text>
  <text class="s" x="135" y="563">AD DS / DNS / DHCP / WDS</text>
  <text class="s" x="135" y="586">NFS shared storage export</text>
  <text class="s" x="135" y="609">3 SSDs pooled in Windows</text>
  <rect class="pill2" x="135" y="628" width="180" height="30" rx="15"/>
  <text class="label" x="153" y="649">Windows-NFS</text>

  <path class="line" d="M665 300 C665 340, 260 340, 260 445"/>
  <text class="label" x="410" y="335">server switchport</text>

  <rect class="card" x="495" y="445" width="250" height="125" rx="12"/>
  <text class="h" x="525" y="485">Proxmox Node 1</text>
  <text class="t" x="525" y="515">pve-01</text>
  <text class="s" x="525" y="540">10.10.10.11</text>

  <rect class="card" x="785" y="445" width="250" height="125" rx="12"/>
  <text class="h" x="815" y="485">Proxmox Node 2</text>
  <text class="t" x="815" y="515">pve-02</text>
  <text class="s" x="815" y="540">10.10.10.12</text>

  <rect class="card" x="1075" y="445" width="250" height="125" rx="12"/>
  <text class="h" x="1105" y="485">Proxmox Node 3</text>
  <text class="t" x="1105" y="515">pve-03</text>
  <text class="s" x="1105" y="540">10.10.10.13</text>

  <path class="line" d="M680 300 C680 360, 620 360, 620 445"/>
  <path class="line" d="M700 300 C700 360, 910 360, 910 445"/>
  <path class="line" d="M720 300 C720 360, 1200 360, 1200 445"/>
  <text class="label" x="850" y="340">cluster node links</text>

  <path class="nfs" d="M415 610 C520 715, 650 715, 745 570"/>
  <path class="nfs" d="M415 620 C610 765, 820 765, 910 570"/>
  <path class="nfs" d="M415 630 C710 815, 1050 795, 1200 570"/>
  <text class="label" x="585" y="752">Windows NFS shared storage mounted by Proxmox nodes</text>

  <rect class="card" x="785" y="640" width="310" height="135" rx="12"/>
  <text class="h" x="820" y="680">Ubuntu Server VM</text>
  <text class="t" x="820" y="710">ubuntu-srv-01</text>
  <text class="s" x="820" y="735">10.10.10.103</text>
  <text class="s" x="820" y="758">SSH key authentication</text>

  <path class="vm" d="M910 570 C910 600, 910 615, 910 640"/>
  <text class="label" x="925" y="612">VM 100</text>

  <rect class="card" x="1135" y="640" width="165" height="135" rx="12"/>
  <text class="h" x="1170" y="680">Docker</text>
  <text class="t" x="1170" y="710">Portainer CE</text>
  <text class="s" x="1170" y="735">9443/TCP</text>
  <text class="s" x="1170" y="758">8000/TCP</text>

  <path class="vm" d="M1095 708 C1110 708, 1120 708, 1135 708"/>
  <text class="label" x="1112" y="695">container</text>

  <rect class="pill" x="90" y="842" width="210" height="34" rx="17"/>
  <text class="label" x="113" y="864">solid blue = uplink/trunk</text>
  <rect class="pill2" x="330" y="842" width="245" height="34" rx="17"/>
  <text class="label" x="353" y="864">green dashed = NFS storage</text>
  <rect class="pill3" x="605" y="842" width="185" height="34" rx="17"/>
  <text class="label" x="628" y="864">gold = VM/container</text>
</svg>

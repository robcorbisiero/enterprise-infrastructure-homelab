---
- name: Install and configure node_exporter on Proxmox nodes
  hosts: proxmox
  become: true
  vars:
    node_exporter_version: "1.8.2"

  tasks:
    - name: Create node_exporter system user
      user:
        name: node_exporter
        system: true
        shell: /usr/sbin/nologin
        create_home: false

    - name: Check whether node_exporter binary is already installed
      stat:
        path: /usr/local/bin/node_exporter
      register: node_exporter_binary

    - name: Download node_exporter release
      get_url:
        url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
        dest: /tmp/node_exporter.tar.gz
      when: not node_exporter_binary.stat.exists

    - name: Extract node_exporter archive
      unarchive:
        src: /tmp/node_exporter.tar.gz
        dest: /tmp
        remote_src: true
      when: not node_exporter_binary.stat.exists

    - name: Install node_exporter binary
      copy:
        src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
        dest: /usr/local/bin/node_exporter
        owner: node_exporter
        group: node_exporter
        mode: "0755"
        remote_src: true
      when: not node_exporter_binary.stat.exists

    - name: Install node_exporter systemd unit
      template:
        src: templates/node_exporter.service.j2
        dest: /etc/systemd/system/node_exporter.service
      notify: restart node_exporter

    - name: Enable and start node_exporter
      systemd:
        name: node_exporter
        enabled: true
        state: started
        daemon_reload: true

  handlers:
    - name: restart node_exporter
      systemd:
        name: node_exporter
        state: restarted
